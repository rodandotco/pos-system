<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP234 Label Printer Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 20px; min-height: 100vh; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #00695c; margin-bottom: 16px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .connected { background: #e8f5e9; color: #2e7d32; }
    .disconnected { background: #fff3e0; color: #e65100; }
    .form-group { margin-bottom: 10px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #455a64; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px; border: 1.5px solid #e0e4e8; border-radius: 8px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #00897b; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 4px; color: white; }
    .btn-primary { background: #00897b; }
    .btn-warning { background: #ff9800; }
    .btn-danger { background: #e53935; }
    .btn-info { background: #2196f3; }
    .btn-block { width: 100%; display: block; margin: 8px 0; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .led-green { background: #4caf50; }
    .led-red { background: #f44336; }
    hr { margin: 16px 0; border: none; border-top: 1px solid #e0e0e0; }
    .log { background: #263238; color: #aed581; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 300px; overflow-y: auto; margin-top: 12px; white-space: pre-wrap; }
    .cmd-box { background: #f5f5f5; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 11px; margin-top: 4px; word-break: break-all; }
  </style>
</head>
<body>
<div class="container">
  <h2>🏷️ Aiyin MP234 - Label Printer Test</h2>
  
  <div id="statusBox" class="status disconnected">
    <span id="statusLed" class="led led-red"></span>
    <span id="statusText">Disconnected</span>
  </div>
  
  <div class="row">
    <button class="btn btn-primary" onclick="connect()">🔗 Connect</button>
    <button class="btn btn-danger" onclick="disconnect()">Putus</button>
  </div>
  
  <hr>
  
  <h3>Label Settings</h3>
  
  <div class="row">
    <div class="form-group"><label>Width (mm)</label><input type="number" id="lblW" value="33" step="0.5"></div>
    <div class="form-group"><label>Height (mm)</label><input type="number" id="lblH" value="15" step="0.5"></div>
    <div class="form-group"><label>Gap (mm)</label><input type="number" id="lblGap" value="2" step="0.5"></div>
  </div>
  
  <div class="row">
    <div class="form-group"><label>Offset X (mm)</label><input type="number" id="lblOX" value="0" step="0.5"></div>
    <div class="form-group"><label>Offset Y (mm)</label><input type="number" id="lblOY" value="0" step="0.5"></div>
    <div class="form-group"><label>Copies</label><input type="number" id="lblCopies" value="1" min="1" max="20"></div>
  </div>
  
  <div class="form-group"><label>Product Name</label><input type="text" id="lblName" value="Test Product"></div>
  <div class="form-group"><label>Price</label><input type="text" id="lblPrice" value="Rp 10.000"></div>
  <div class="form-group"><label>Barcode</label><input type="text" id="lblBarcode" value="899123456789"></div>
  
  <hr>
  
  <h3>Test Commands</h3>
  
  <button class="btn btn-info btn-block" onclick="testPrint(1)">🧪 Test 1: ESC/POS (SIZE, CLS, TEXT, PRINT)</button>
  <button class="btn btn-info btn-block" onclick="testPrint(2)">🧪 Test 2: ESC/POS with GAP 0</button>
  <button class="btn btn-info btn-block" onclick="testPrint(3)">🧪 Test 3: TSPL (SIZE, GAP, CLS, TEXT, BARCODE)</button>
  <button class="btn btn-info btn-block" onclick="testPrint(4)">🧪 Test 4: PPLB (!, LABEL, TEXT, BARCODE, PRINT)</button>
  <button class="btn btn-info btn-block" onclick="testPrint(5)">🧪 Test 5: Plain text only</button>
  <button class="btn btn-info btn-block" onclick="testPrint(6)">🧪 Test 6: ESC/POS with FEED before print</button>
  
  <hr>
  
  <h3>Log</h3>
  <div class="log" id="logBox">Ready to test. Connect printer first.</div>
  <button class="btn btn-sm btn-danger" onclick="document.getElementById('logBox').innerHTML=''">Clear Log</button>
</div>

<script>
var device = null;
var characteristic = null;

function log(msg) {
  var box = document.getElementById('logBox');
  var time = new Date().toLocaleTimeString('id-ID');
  box.innerHTML += '[' + time + '] ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}

function mmToDots(mm) { return Math.round(mm * 8); }

async function connect() {
  try {
    log('Scanning for devices...');
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '000018f0-0000-1000-8000-00805f9b34fb',
        '00001101-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '0000ff00-0000-1000-8000-00805f9b34fb'
      ]
    });
    log('Device: ' + device.name);
    
    var server = await device.gatt.connect();
    log('GATT connected');
    
    var services = await server.getPrimaryServices();
    log('Found ' + services.length + ' services');
    
    for (var i = 0; i < services.length; i++) {
      try {
        var chars = await services[i].getCharacteristics();
        for (var j = 0; j < chars.length; j++) {
          log('  Service: ' + services[i].uuid.substring(0,8) + ' Char: ' + chars[j].uuid.substring(0,8) + ' write=' + chars[j].properties.write + ' woResp=' + chars[j].properties.writeWithoutResponse);
          if (chars[j].properties.write || chars[j].properties.writeWithoutResponse) {
            characteristic = chars[j];
            log('  >>> USING THIS');
          }
        }
      } catch(e) {}
    }
    
    if (characteristic) {
      document.getElementById('statusBox').className = 'status connected';
      document.getElementById('statusLed').className = 'led led-green';
      document.getElementById('statusText').textContent = 'Connected to ' + device.name;
      log('SUCCESS: Printer ready!');
    } else {
      log('ERROR: No writable characteristic');
    }
  } catch(e) {
    log('ERROR: ' + e.message);
  }
}

function disconnect() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
  device = null;
  characteristic = null;
  document.getElementById('statusBox').className = 'status disconnected';
  document.getElementById('statusLed').className = 'led led-red';
  document.getElementById('statusText').textContent = 'Disconnected';
  log('Disconnected');
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function testPrint(mode) {
  if (!device || !characteristic) {
    alert('Connect printer first!');
    return;
  }
  
  var w = mmToDots(parseFloat(document.getElementById('lblW').value) || 33);
  var h = mmToDots(parseFloat(document.getElementById('lblH').value) || 15);
  var gap = mmToDots(parseFloat(document.getElementById('lblGap').value) || 2);
  var ox = mmToDots(parseFloat(document.getElementById('lblOX').value) || 0);
  var oy = mmToDots(parseFloat(document.getElementById('lblOY').value) || 0);
  var copies = parseInt(document.getElementById('lblCopies').value) || 1;
  var name = document.getElementById('lblName').value.substring(0, 20);
  var price = document.getElementById('lblPrice').value;
  var barcode = document.getElementById('lblBarcode').value;
  
  var encoder = new TextEncoder();
  var cmd = '';
  var modeName = '';
  
  if (mode === 1) {
    modeName = 'ESC/POS Basic';
    cmd += '\x1B\x40\r\n';
    cmd += 'SIZE ' + w + ',' + h + '\r\n';
    cmd += 'CLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"' + name + '"\r\n';
    cmd += 'TEXT 10,50,"3",0,1,1,"' + price + '"\r\n';
    cmd += 'TEXT 10,80,"2",0,1,1,"' + barcode + '"\r\n';
    cmd += 'PRINT 1\r\n';
  } else if (mode === 2) {
    modeName = 'ESC/POS with GAP 0';
    cmd += '\x1B\x40\r\n';
    cmd += 'SIZE ' + w + ',' + h + '\r\n';
    cmd += 'GAP 0,0\r\n';
    cmd += 'CLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"' + name + '"\r\n';
    cmd += 'TEXT 10,50,"3",0,1,1,"' + price + '"\r\n';
    cmd += 'BARCODE 10,70,"128",40,1,0,1,1,"' + barcode + '"\r\n';
    cmd += 'PRINT 1\r\n';
  } else if (mode === 3) {
    modeName = 'TSPL Format';
    cmd += 'SIZE ' + w + ' mm,' + h + ' mm\r\n';
    cmd += 'GAP 0 mm,0\r\n';
    cmd += 'DIRECTION 1\r\n';
    cmd += 'CLS\r\n';
    cmd += 'TEXT 10,10,"1",0,1,1,"' + name + '"\r\n';
    cmd += 'TEXT 10,40,"1",0,2,2,"' + price + '"\r\n';
    cmd += 'BARCODE 10,70,"128",50,1,0,2,2,"' + barcode + '"\r\n';
    cmd += 'PRINT 1\r\n';
  } else if (mode === 4) {
    modeName = 'PPLB Format';
    cmd += '! 0 200 200 120 1\r\n';
    cmd += 'LABEL\r\n';
    cmd += 'CONTRAST 2\r\n';
    cmd += 'SPEED 3\r\n';
    cmd += 'TEXT 10 10 0 3 1 ' + name + '\r\n';
    cmd += 'TEXT 10 50 0 4 2 ' + price + '\r\n';
    cmd += 'BARCODE 10 80 0 128 2 1 ' + barcode + '\r\n';
    cmd += 'END\r\n';
    cmd += 'FORM\r\n';
    cmd += 'PRINT\r\n';
  } else if (mode === 5) {
    modeName = 'Plain Text';
    cmd = name + '\n' + price + '\n' + barcode + '\n\n\n\n';
  } else if (mode === 6) {
    modeName = 'ESC/POS with FEED';
    cmd += '\x1B\x40\r\n';
    cmd += 'SIZE ' + w + ',' + h + '\r\n';
    cmd += 'CLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"' + name + '"\r\n';
    cmd += 'TEXT 10,50,"3",0,1,1,"' + price + '"\r\n';
    cmd += 'TEXT 10,80,"2",0,1,1,"' + barcode + '"\r\n';
    cmd += 'PRINT 1\r\n';
    cmd += 'FEED 0\r\n';
  }
  
  log('--- ' + modeName + ' ---');
  log('Width: ' + w + ' Height: ' + h + ' Gap: ' + gap + ' Copies: ' + copies);
  log('Command: ' + cmd.replace(/\r\n/g, '\\n').substring(0, 100) + '...');
  
  try {
    for (var copy = 0; copy < copies; copy++) {
      var data = encoder.encode(cmd);
      log('Sending copy ' + (copy+1) + '/' + copies + ' (' + data.byteLength + ' bytes)');
      
      for (var i = 0; i < data.byteLength; i += 20) {
        var chunk = data.slice(i, Math.min(i + 20, data.byteLength));
        try {
          await characteristic.writeValueWithoutResponse(chunk);
        } catch(e) {
          await characteristic.writeValue(chunk);
        }
        await sleep(80);
      }
      
      if (copy < copies - 1) {
        await sleep(1000);
      }
    }
    log('DONE!');
  } catch(e) {
    log('ERROR: ' + e.message);
  }
}
</script>
</body>
</html>
