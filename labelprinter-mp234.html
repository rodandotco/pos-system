<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeePRT No-Skip Test FINAL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #00695c; margin-bottom: 16px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .connected { background: #e8f5e9; color: #2e7d32; }
    .disconnected { background: #fff3e0; color: #e65100; }
    .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin: 4px 0; color: white; display: block; width: 100%; }
    .btn-primary { background: #00897b; }
    .btn-danger { background: #e53935; }
    .btn-test { background: #ff9800; }
    .btn-new { background: #e91e63; }
    .btn-gap { background: #9c27b0; }
    .btn-cal { background: #00bcd4; }
    .led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .led-green { background: #4caf50; }
    .led-red { background: #f44336; }
    .log { background: #263238; color: #aed581; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 10px; max-height: 300px; overflow-y: auto; margin-top: 12px; white-space: pre-wrap; }
    hr { margin: 12px 0; border: none; border-top: 1px solid #e0e0e0; }
    .section-title { font-size: 12px; font-weight: bold; margin-top: 8px; }
    .section-title.orange { color: #ff9800; }
    .section-title.pink { color: #e91e63; }
    .section-title.purple { color: #9c27b0; }
    .section-title.cyan { color: #00bcd4; }
  </style>
</head>
<body>
<div class="container">
  <h2>🐝 BeePRT No-Skip Test</h2>
  
  <div id="statusBox" class="status disconnected">
    <span id="statusLed" class="led led-red"></span>
    <span id="statusText">Disconnected</span>
  </div>
  
  <button class="btn btn-primary" onclick="connect()">🔗 Connect Printer</button>
  <button class="btn btn-danger" onclick="disconnect()">Putus</button>
  
  <hr>
  
  <p class="section-title orange">Basic Tests</p>
  <button class="btn btn-test" onclick="testBeePRT(1)">Test 1: PRINT only</button>
  <button class="btn btn-test" onclick="testBeePRT(4)">Test 4: SIZE + PRINT</button>
  <button class="btn btn-test" onclick="testBeePRT(9)">Test 9: SIZE+GAP 0+CLS+PRINT (best quality)</button>
  
  <p class="section-title pink">Multi-Label Tests</p>
  <button class="btn btn-new" onclick="testBeePRT(11)">Test 11: 2 labels side by side, one PRINT</button>
  <button class="btn btn-new" onclick="testBeePRT(12)">Test 12: PRINT 2</button>
  <button class="btn btn-new" onclick="testBeePRT(13)">Test 13: CLS+TEXT+PRINT repeated</button>
  
  <p class="section-title purple">GAP/Height Tests</p>
  <button class="btn btn-gap" onclick="testBeePRT(15)">Test 15: SIZE h+gap (136), GAP 0</button>
  <button class="btn btn-gap" onclick="testBeePRT(16)">Test 16: SIZE h+gap (136), no GAP</button>
  <button class="btn btn-gap" onclick="testBeePRT(17)">Test 17: GAP 16 dots (match 2mm)</button>
  
  <p class="section-title cyan">Calibration Tests (mm units)</p>
  <button class="btn btn-cal" onclick="testBeePRT(18)">Test 18: AUTOSENSE + GAP mm + SIZE mm</button>
  <button class="btn btn-cal" onclick="testBeePRT(19)">Test 19: GAP 2mm in mm units</button>
  <button class="btn btn-cal" onclick="testBeePRT(20)">Test 20: SIZE mm + GAP mm</button>
  
  <hr>
  <h3>Log</h3>
  <div class="log" id="logBox">Ready. Connect printer first.</div>
</div>

<script>
var device = null;
var characteristic = null;

function log(msg) {
  var box = document.getElementById('logBox');
  var time = new Date().toLocaleTimeString('id-ID');
  box.innerHTML += '[' + time + '] ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '000018f0-0000-1000-8000-00805f9b34fb',
        '00001101-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '0000ff00-0000-1000-8000-00805f9b34fb'
      ]
    });
    log('Device: ' + device.name);
    var server = await device.gatt.connect();
    var services = await server.getPrimaryServices();
    for (var i = 0; i < services.length; i++) {
      try {
        var chars = await services[i].getCharacteristics();
        for (var j = 0; j < chars.length; j++) {
          if (chars[j].properties.write || chars[j].properties.writeWithoutResponse) {
            characteristic = chars[j];
          }
        }
      } catch(e) {}
    }
    if (characteristic) {
      document.getElementById('statusBox').className = 'status connected';
      document.getElementById('statusLed').className = 'led led-green';
      document.getElementById('statusText').textContent = 'Connected: ' + device.name;
      log('READY!');
    }
  } catch(e) { log('ERROR: ' + e.message); }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
  device = null; characteristic = null;
  document.getElementById('statusBox').className = 'status disconnected';
  document.getElementById('statusLed').className = 'led led-red';
  document.getElementById('statusText').textContent = 'Disconnected';
  log('Disconnected');
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function sendCmd(cmd, label) {
  var encoder = new TextEncoder();
  var data = encoder.encode(cmd);
  log(label + ': ' + data.byteLength + ' bytes');
  for (var i = 0; i < data.byteLength; i += 20) {
    var chunk = data.slice(i, Math.min(i + 20, data.byteLength));
    try { await characteristic.writeValueWithoutResponse(chunk); }
    catch(e) { await characteristic.writeValue(chunk); }
    await sleep(80);
  }
}

async function testBeePRT(testNum) {
  if (!device || !characteristic) { alert('Connect first!'); return; }
  
  var desc = '';
  var cmd = '';
  
  if (testNum === 1) {
    desc = 'PRINT only';
    cmd = 'TEXT 10,10,"3",0,1,1,"T1"\r\nBARCODE 10,40,"128",30,1,0,1,1,"111"\r\nPRINT 1\r\n';
  }
  else if (testNum === 4) {
    desc = 'SIZE+PRINT';
    cmd = 'SIZE 264,120\r\nTEXT 10,10,"3",0,1,1,"T4"\r\nBARCODE 10,40,"128",30,1,0,1,1,"444"\r\nPRINT 1\r\n';
  }
  else if (testNum === 9) {
    desc = 'SIZE+GAP 0+CLS+PRINT';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T9"\r\nBARCODE 10,40,"128",30,1,0,1,1,"999"\r\nPRINT 1\r\n';
  }
  else if (testNum === 11) {
    desc = '2 labels side by side';
    cmd = 'SIZE 544,120\r\nGAP 0,0\r\nCLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"L11-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"111"\r\n';
    cmd += 'TEXT 290,10,"3",0,1,1,"L11-B"\r\nBARCODE 290,40,"128",30,1,0,1,1,"222"\r\n';
    cmd += 'PRINT 1\r\n';
  }
  else if (testNum === 12) {
    desc = 'PRINT 2';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T12"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1212"\r\nPRINT 2\r\n';
  }
  else if (testNum === 13) {
    desc = 'CLS+TEXT+PRINT x2';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T13-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"131"\r\nPRINT 1\r\n';
    cmd += 'CLS\r\nTEXT 10,10,"3",0,1,1,"T13-B"\r\nBARCODE 10,40,"128",30,1,0,1,1,"132"\r\nPRINT 1\r\n';
  }
  else if (testNum === 15) {
    desc = 'SIZE h+gap (136), GAP 0';
    cmd = 'SIZE 264,136\r\nGAP 0,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T15"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1515"\r\nPRINT 1\r\n';
  }
  else if (testNum === 16) {
    desc = 'SIZE h+gap (136), no GAP';
    cmd = 'SIZE 264,136\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T16"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1616"\r\nPRINT 1\r\n';
  }
  else if (testNum === 17) {
    desc = 'GAP 16 dots';
    cmd = 'SIZE 264,120\r\nGAP 16,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T17"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1717"\r\nPRINT 1\r\n';
  }
  else if (testNum === 18) {
    desc = 'AUTOSENSE + GAP mm + SIZE mm';
    cmd = '\x1B\x40\r\nAUTOSENSE\r\n';
    cmd += 'GAP 2 mm,0\r\n';
    cmd += 'SIZE 33 mm,15 mm\r\n';
    cmd += 'CLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"T18"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1818"\r\n';
    cmd += 'PRINT 1\r\n';
  }
  else if (testNum === 19) {
    desc = 'GAP 2mm in mm';
    cmd = 'SIZE 264,120\r\nGAP 2 mm,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T19"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1919"\r\nPRINT 1\r\n';
  }
  else if (testNum === 20) {
    desc = 'SIZE mm + GAP mm';
    cmd = 'SIZE 33 mm,15 mm\r\nGAP 2 mm,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T20"\r\nBARCODE 10,40,"128",30,1,0,1,1,"2020"\r\nPRINT 1\r\n';
  }
  
  log('--- Test ' + testNum + ': ' + desc + ' ---');
  
  // Send 2 copies with delay to test skipping
  await sendCmd(cmd, 'Copy 1');
  log('Waiting 2s...');
  await sleep(2000);
  await sendCmd(cmd, 'Copy 2');
  
  log('DONE Test ' + testNum + ' | Prints? Skips?');
}
</script>
</body>
</html>
