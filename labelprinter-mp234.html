<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP234 PPLB Quality Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #00695c; margin-bottom: 16px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .connected { background: #e8f5e9; color: #2e7d32; }
    .disconnected { background: #fff3e0; color: #e65100; }
    .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin: 4px; color: white; }
    .btn-primary { background: #00897b; }
    .btn-danger { background: #e53935; }
    .btn-info { background: #2196f3; }
    .btn-success { background: #4caf50; }
    .btn-block { width: 100%; display: block; margin: 8px 0; }
    .led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .led-green { background: #4caf50; }
    .led-red { background: #f44336; }
    .log { background: #263238; color: #aed581; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
<div class="container">
  <h2>🧪 PPLB Quality Tests</h2>
  
  <div id="statusBox" class="status disconnected">
    <span id="statusLed" class="led led-red"></span>
    <span id="statusText">Disconnected</span>
  </div>
  
  <button class="btn btn-primary" onclick="connect()">🔗 Connect</button>
  <button class="btn btn-danger" onclick="disconnect()">Putus</button>
  
  <hr>
  
  <button class="btn btn-info btn-block" onclick="testPPLB(1)">P1: Font 1, Size 1</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(2)">P2: Font 2, Size 1.5</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(3)">P3: Font 3, Size 1</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(4)">P4: Font 4, Size 1</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(5)">P5: Font 5, Size 1</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(6)">P6: Bold text simulation</button>
  <button class="btn btn-info btn-block" onclick="testPPLB(7)">P7: Large text, small barcode</button>
  
  <hr>
  
  <div class="log" id="logBox">Ready.</div>
  <button class="btn btn-sm btn-danger" onclick="document.getElementById('logBox').innerHTML=''">Clear</button>
</div>

<script>
var device = null;
var characteristic = null;

function log(msg) {
  var box = document.getElementById('logBox');
  box.innerHTML += '[' + new Date().toLocaleTimeString('id-ID') + '] ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb','00001101-0000-1000-8000-00805f9b34fb','49535343-fe7d-4ae5-8fa9-9fafd205e455','e7810a71-73ae-499d-8c15-faa9aef0c3f2','0000ff00-0000-1000-8000-00805f9b34fb']
    });
    var server = await device.gatt.connect();
    var services = await server.getPrimaryServices();
    for (var i = 0; i < services.length; i++) {
      try {
        var chars = await services[i].getCharacteristics();
        for (var j = 0; j < chars.length; j++) {
          if (chars[j].properties.write || chars[j].properties.writeWithoutResponse) {
            characteristic = chars[j];
          }
        }
      } catch(e) {}
    }
    document.getElementById('statusBox').className = 'status connected';
    document.getElementById('statusLed').className = 'led led-green';
    document.getElementById('statusText').textContent = 'Connected: ' + device.name;
    log('Ready!');
  } catch(e) { log('Error: ' + e.message); }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
  device = null; characteristic = null;
  document.getElementById('statusBox').className = 'status disconnected';
  document.getElementById('statusLed').className = 'led led-red';
  document.getElementById('statusText').textContent = 'Disconnected';
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function testPPLB(mode) {
  if (!device || !characteristic) { alert('Connect first!'); return; }
  
  var encoder = new TextEncoder();
  var name = 'Indomie Goreng';
  var price = 'Rp 3.500';
  var barcode = '899123456789';
  
  var fonts = [
    { nameFont: 1, priceFont: 2, size: 1 },    // P1
    { nameFont: 2, priceFont: 2, size: 1.5 },  // P2
    { nameFont: 3, priceFont: 4, size: 1 },    // P3
    { nameFont: 4, priceFont: 4, size: 1 },    // P4
    { nameFont: 5, priceFont: 5, size: 1 },    // P5
    { nameFont: 1, priceFont: 1, size: 2 },    // P6 - Bold sim (double print)
    { nameFont: 5, priceFont: 5, size: 2 },    // P7 - Large
  ];
  
  var f = fonts[mode - 1];
  
  for (var copy = 0; copy < 2; copy++) {
    var cmd = '';
    cmd += '! 0 200 200 120 1\r\n';
    cmd += 'LABEL\r\n';
    cmd += 'CONTRAST 3\r\n';
    cmd += 'SPEED 2\r\n';
    
    // Left
    cmd += 'TEXT 10 5 0 ' + f.nameFont + ' ' + f.size + ' ' + name + '\r\n';
    cmd += 'TEXT 10 45 0 ' + f.priceFont + ' ' + f.size + ' ' + price + '\r\n';
    cmd += 'BARCODE 10 70 0 128 2 1 ' + barcode + '\r\n';
    
    // Right
    cmd += 'TEXT 285 5 0 ' + f.nameFont + ' ' + f.size + ' ' + name + '\r\n';
    cmd += 'TEXT 285 45 0 ' + f.priceFont + ' ' + f.size + ' ' + price + '\r\n';
    cmd += 'BARCODE 285 70 0 128 2 1 ' + barcode + '\r\n';
    
    cmd += 'END\r\nFORM\r\nPRINT\r\n';
    
    if (mode === 6) {
      // Print twice for bold effect
      cmd += 'END\r\nFORM\r\nPRINT\r\n';
    }
    
    log('P' + mode + ' Copy ' + (copy+1) + ': ' + cmd.length + ' chars');
    
    var data = encoder.encode(cmd);
    for (var i = 0; i < data.byteLength; i += 20) {
      var chunk = data.slice(i, Math.min(i + 20, data.byteLength));
      try { await characteristic.writeValueWithoutResponse(chunk); }
      catch(e) { await characteristic.writeValue(chunk); }
      await sleep(80);
    }
    
    if (copy < 1) await sleep(300);
  }
  log('Done P' + mode);
}
</script>
</body>
</html>
