<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeePRT No-Skip Test v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #00695c; margin-bottom: 16px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .connected { background: #e8f5e9; color: #2e7d32; }
    .disconnected { background: #fff3e0; color: #e65100; }
    .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 6px 0; color: white; display: block; width: 100%; }
    .btn-primary { background: #00897b; }
    .btn-danger { background: #e53935; }
    .btn-test { background: #ff9800; }
    .btn-new { background: #e91e63; }
    .led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .led-green { background: #4caf50; }
    .led-red { background: #f44336; }
    .log { background: #263238; color: #aed581; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 400px; overflow-y: auto; margin-top: 12px; white-space: pre-wrap; }
    hr { margin: 16px 0; border: none; border-top: 1px solid #e0e0e0; }
  </style>
</head>
<body>
<div class="container">
  <h2>🐝 BeePRT No-Skip Test v2</h2>
  
  <div id="statusBox" class="status disconnected">
    <span id="statusLed" class="led led-red"></span>
    <span id="statusText">Disconnected</span>
  </div>
  
  <button class="btn btn-primary" onclick="connect()">🔗 Connect Printer</button>
  <button class="btn btn-danger" onclick="disconnect()">Putus</button>
  
  <hr>
  <p style="font-size:12px;color:#666;">Original tests - check for skip behavior</p>
  
  <button class="btn btn-test" onclick="testBeePRT(1)">🐝 Test 1: Only PRINT (no SIZE, no GAP)</button>
  <button class="btn btn-test" onclick="testBeePRT(2)">🐝 Test 2: PRINT without \r\n (just \n)</button>
  <button class="btn btn-test" onclick="testBeePRT(3)">🐝 Test 3: Minimal - TEXT only, no PRINT command</button>
  <button class="btn btn-test" onclick="testBeePRT(4)">🐝 Test 4: SIZE + PRINT (no GAP, no CLS)</button>
  <button class="btn btn-test" onclick="testBeePRT(5)">🐝 Test 5: SIZE 0,0 + PRINT (auto size)</button>
  <button class="btn btn-test" onclick="testBeePRT(6)">🐝 Test 6: Raw text, no commands at all</button>
  <button class="btn btn-test" onclick="testBeePRT(7)">🐝 Test 7: ESC @ reset only, then text</button>
  <button class="btn btn-test" onclick="testBeePRT(8)">🐝 Test 8: PRINT 1 with FORMFEED</button>
  <button class="btn btn-test" onclick="testBeePRT(9)">🐝 Test 9: SIZE + GAP 0 + CLS + PRINT 1</button>
  <button class="btn btn-test" onclick="testBeePRT(10)">🐝 Test 10: SIZE + GAP 0 + PRINT 1 (no CLS)</button>
  
  <hr>
  <p style="font-size:12px;color:#e91e63;font-weight:bold;">NEW tests - no-skip solutions</p>
  
  <button class="btn btn-new" onclick="testBeePRT(11)">🆕 Test 11: One SIZE, multiple TEXT sets, one PRINT</button>
  <button class="btn btn-new" onclick="testBeePRT(12)">🆕 Test 12: PRINT 2 (multiple copies in one command)</button>
  <button class="btn btn-new" onclick="testBeePRT(13)">🆕 Test 13: CLS+TEXT+PRINT+CLS+TEXT+PRINT in one send</button>
  <button class="btn btn-new" onclick="testBeePRT(14)">🆕 Test 14: ESC @ between each copy, one BLE send</button>
  
  <hr>
  <h3>Log</h3>
  <div class="log" id="logBox">Ready. Connect printer first, then test each button.</div>
</div>

<script>
var device = null;
var characteristic = null;

function log(msg) {
  var box = document.getElementById('logBox');
  var time = new Date().toLocaleTimeString('id-ID');
  box.innerHTML += '[' + time + '] ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '000018f0-0000-1000-8000-00805f9b34fb',
        '00001101-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '0000ff00-0000-1000-8000-00805f9b34fb'
      ]
    });
    log('Device: ' + device.name);
    var server = await device.gatt.connect();
    var services = await server.getPrimaryServices();
    for (var i = 0; i < services.length; i++) {
      try {
        var chars = await services[i].getCharacteristics();
        for (var j = 0; j < chars.length; j++) {
          if (chars[j].properties.write || chars[j].properties.writeWithoutResponse) {
            characteristic = chars[j];
          }
        }
      } catch(e) {}
    }
    if (characteristic) {
      document.getElementById('statusBox').className = 'status connected';
      document.getElementById('statusLed').className = 'led led-green';
      document.getElementById('statusText').textContent = 'Connected: ' + device.name;
      log('READY!');
    }
  } catch(e) { log('ERROR: ' + e.message); }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
  device = null; characteristic = null;
  document.getElementById('statusBox').className = 'status disconnected';
  document.getElementById('statusLed').className = 'led led-red';
  document.getElementById('statusText').textContent = 'Disconnected';
  log('Disconnected');
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function sendCmd(cmd, label) {
  var encoder = new TextEncoder();
  var data = encoder.encode(cmd);
  log(label + ': ' + data.byteLength + ' bytes');
  for (var i = 0; i < data.byteLength; i += 20) {
    var chunk = data.slice(i, Math.min(i + 20, data.byteLength));
    try { await characteristic.writeValueWithoutResponse(chunk); }
    catch(e) { await characteristic.writeValue(chunk); }
    await sleep(80);
  }
}

async function testBeePRT(testNum) {
  if (!device || !characteristic) { alert('Connect first!'); return; }
  
  var desc = '';
  var cmd = '';
  
  if (testNum === 1) {
    desc = 'PRINT only, no SIZE/GAP';
    cmd = 'TEXT 10,10,"3",0,1,1,"T1-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"111"\r\nPRINT 1\r\n';
    log('--- Test 1: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 2) {
    desc = 'PRINT with \\n only';
    cmd = 'TEXT 10,10,"3",0,1,1,"T2-A"\nBARCODE 10,40,"128",30,1,0,1,1,"222"\nPRINT 1\n';
    log('--- Test 2: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 3) {
    desc = 'TEXT only, no PRINT';
    cmd = 'TEXT 10,10,"3",0,1,1,"T3-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"333"\r\n';
    log('--- Test 3: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 4) {
    desc = 'SIZE + PRINT, no GAP/CLS';
    cmd = 'SIZE 264,120\r\nTEXT 10,10,"3",0,1,1,"T4-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"444"\r\nPRINT 1\r\n';
    log('--- Test 4: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 5) {
    desc = 'SIZE 0,0 (auto)';
    cmd = 'SIZE 0,0\r\nTEXT 10,10,"3",0,1,1,"T5-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"555"\r\nPRINT 1\r\n';
    log('--- Test 5: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 6) {
    desc = 'Raw text only';
    cmd = 'T6-A\n555\n\n\n\n';
    log('--- Test 6: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 7) {
    desc = 'ESC @ reset + text';
    cmd = '\x1B\x40T7-A\n666\n\n\n\n';
    log('--- Test 7: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 8) {
    desc = 'PRINT 1 + FORMFEED';
    cmd = 'SIZE 264,120\r\nTEXT 10,10,"3",0,1,1,"T8-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"888"\r\nPRINT 1\r\nFORMFEED\r\n';
    log('--- Test 8: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 9) {
    desc = 'SIZE+GAP 0+CLS+PRINT';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\nTEXT 10,10,"3",0,1,1,"T9-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"999"\r\nPRINT 1\r\n';
    log('--- Test 9: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  else if (testNum === 10) {
    desc = 'SIZE+GAP 0+PRINT (no CLS)';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nTEXT 10,10,"3",0,1,1,"T10-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"000"\r\nPRINT 1\r\n';
    log('--- Test 10: ' + desc + ' ---');
    await sendCmd(cmd, 'Copy1'); await sleep(1500);
    await sendCmd(cmd, 'Copy2');
  }
  // ===== NEW TESTS =====
  else if (testNum === 11) {
    desc = 'One SIZE, 4 labels in one PRINT';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"T11-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"111"\r\n';
    cmd += 'TEXT 280,10,"3",0,1,1,"T11-B"\r\nBARCODE 280,40,"128",30,1,0,1,1,"222"\r\n';
    cmd += 'PRINT 1\r\n';
    log('--- Test 11: ' + desc + ' ---');
    await sendCmd(cmd, 'Single send (2 labels inside)');
  }
  else if (testNum === 12) {
    desc = 'PRINT 2 command';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\nCLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"T12"\r\nBARCODE 10,40,"128",30,1,0,1,1,"1212"\r\n';
    cmd += 'PRINT 2\r\n';
    log('--- Test 12: ' + desc + ' ---');
    await sendCmd(cmd, 'Single send (PRINT 2)');
  }
  else if (testNum === 13) {
    desc = 'CLS+TEXT+PRINT repeated in one send';
    cmd = 'SIZE 264,120\r\nGAP 0,0\r\n';
    cmd += 'CLS\r\nTEXT 10,10,"3",0,1,1,"T13-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"131"\r\nPRINT 1\r\n';
    cmd += 'CLS\r\nTEXT 10,10,"3",0,1,1,"T13-B"\r\nBARCODE 10,40,"128",30,1,0,1,1,"132"\r\nPRINT 1\r\n';
    log('--- Test 13: ' + desc + ' ---');
    await sendCmd(cmd, 'Single send (2 prints inside)');
  }
  else if (testNum === 14) {
    desc = 'ESC @ between copies, one BLE send';
    cmd = '\x1B\x40SIZE 264,120\r\nGAP 0,0\r\nCLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"T14-A"\r\nBARCODE 10,40,"128",30,1,0,1,1,"141"\r\nPRINT 1\r\n';
    cmd += '\x1B\x40SIZE 264,120\r\nGAP 0,0\r\nCLS\r\n';
    cmd += 'TEXT 10,10,"3",0,1,1,"T14-B"\r\nBARCODE 10,40,"128",30,1,0,1,1,"142"\r\nPRINT 1\r\n';
    log('--- Test 14: ' + desc + ' ---');
    await sendCmd(cmd, 'Single send with ESC @ between');
  }
  
  log('DONE Test ' + testNum);
}
</script>
</body>
</html>
